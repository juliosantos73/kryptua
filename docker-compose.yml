services:
  relay:
    build:
      context: relay-server
      dockerfile: Dockerfile
    ports:
      - "8765:8080"
    environment:
      PORT: "8080"
      DATA_DIR: "/data"
    volumes:
      - relay-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  relay-data:
