name: CI — Mobile Android (Capacitor)

on:
  push:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'core-crypto/**'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK (debug)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Wasm ──────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build core-crypto → Wasm
        working-directory: core-crypto
        run: wasm-pack build --target bundler --release

      # ── Web ───────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      # ── Capacitor + Android ───────────────────────────────
      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm ci

      - name: Sync Capacitor → Android
        working-directory: apps/mobile
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      # ── Java / Gradle ─────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*') }}

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kryptua-debug.apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

  build-aab:
    name: Build AAB (release, se keystore disponível)
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build web + sync Capacitor
        working-directory: apps/mobile
        run: |
          cd ../web && npm ci && npm run build
          cd ../mobile && npm ci && npx cap sync android

      - name: Build release AAB
        if: vars.KEYSTORE_CONFIGURED == 'true'
        working-directory: apps/mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > kryptua-release.keystore
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/kryptua-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload AAB
        if: vars.KEYSTORE_CONFIGURED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kryptua-release.aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
