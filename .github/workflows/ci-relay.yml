name: CI — Relay Server (Go)

on:
  push:
    paths:
      - 'relay-server/**'
  pull_request:
    paths:
      - 'relay-server/**'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: relay-server/go.sum

      - name: Test
        working-directory: relay-server
        run: go test ./...

      - name: Build
        working-directory: relay-server
        run: go build -o kryptua-relay ./src/

  build-arm:
    name: Build ARM64 (VPS target)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile para ARM64
        working-directory: relay-server
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -o kryptua-relay-arm64 ./src/

      - uses: actions/upload-artifact@v4
        with:
          name: relay-arm64
          path: relay-server/kryptua-relay-arm64
