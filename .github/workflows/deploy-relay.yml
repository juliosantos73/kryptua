name: Deploy — Relay Server (VPS ARM)

on:
  push:
    branches: [main]
    paths:
      - 'relay-server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build ARM64 + Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build ARM64
        working-directory: relay-server
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o kryptua-relay ./src/

      # Requer secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
      - name: Deploy para VPS ARM
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/kryptua
            systemctl stop kryptua-relay || true

      - name: Upload binário
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: relay-server/kryptua-relay
          target: /opt/kryptua/

      - name: Reiniciar serviço
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod +x /opt/kryptua/kryptua-relay
            systemctl start kryptua-relay
            systemctl status kryptua-relay --no-pager
